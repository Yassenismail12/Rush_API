{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Wallet | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'wallet/app.css' %}">
</head>
<body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="container min-vh-100 d-flex align-items-center py-5">
        <section class="auth-wrap mx-auto w-100">
            <div class="glass-card p-4 p-md-5 reveal-up in">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div>
                        <h1 class="brand-title mb-1">Rush Wallet</h1>
                        <p class="text-soft mb-0">Login to your account</p>
                    </div>
                </div>

                <form
                    id="login-form"
                    class="row g-3"
                    autocomplete="on"
                    method="post"
                    action="/api/wallet/token/"
                >
                    <div class="col-12">
                        <label class="form-label">Username</label>
                        <input name="username" type="text" class="form-control form-control-lg wallet-input" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <input name="password" type="password" class="form-control form-control-lg wallet-input" required>
                    </div>
                    <div class="col-12 d-grid mt-2">
                        <button type="submit" class="btn btn-wallet btn-lg">Sign In</button>
                    </div>
                </form>

                <p class="text-soft mt-3 mb-0">No account? <a class="wallet-link" href="/register/">Create one</a></p>
            </div>
        </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="{% static 'wallet/login.js' %}"></script>
</body>
</html>
